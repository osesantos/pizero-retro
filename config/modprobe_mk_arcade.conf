# =============================================================================
# Anemoia-PiZero - mk_arcade_joystick_rpi GPIO button configuration
# =============================================================================
# Copy this file to: /etc/modprobe.d/mk_arcade_joystick_rpi.conf
# Then add "mk_arcade_joystick_rpi" to /etc/modules (one line, no quotes).
#
# This configures the mk_arcade_joystick_rpi kernel module to expose the 8
# tactile buttons wired to the Pi Zero's GPIO pins as a standard Linux gamepad
# (visible to RetroArch as a joystick device).
#
# Button-to-GPIO mapping (matches the wiring table in README.md):
#   Up     = GPIO13  (Pi Zero Pin 33)
#   Down   = GPIO19  (Pi Zero Pin 35)
#   Left   = GPIO16  (Pi Zero Pin 36)
#   Right  = GPIO20  (Pi Zero Pin 38)
#   Start  = GPIO21  (Pi Zero Pin 40)
#   Select = GPIO26  (Pi Zero Pin 37)
#   A      = GPIO5   (Pi Zero Pin 29)
#   B      = GPIO6   (Pi Zero Pin 31)
#
# The gpio= parameter order is: up,down,left,right,start,select,a,b
# =============================================================================
options mk_arcade_joystick_rpi map=1 gpio=13,19,16,20,21,26,5,6
