# =============================================================================
# Anemoia-PiZero - Adafruit retrogame GPIO button configuration
# =============================================================================
# Copy this file to: /boot/retrogame.cfg
#
# retrogame is a userspace daemon that reads GPIO pins and emits keyboard
# events via /dev/uinput, making the buttons visible to EmulationStation
# and RetroArch as a keyboard/joystick device.
#
# Button-to-GPIO mapping (matches the wiring table in README.md):
#   Up     = GPIO13  (Pi Zero Pin 33)
#   Down   = GPIO19  (Pi Zero Pin 35)
#   Left   = GPIO16  (Pi Zero Pin 36)
#   Right  = GPIO20  (Pi Zero Pin 38)
#   Start  = GPIO21  (Pi Zero Pin 40)
#   Select = GPIO26  (Pi Zero Pin 37)
#   A      = GPIO5   (Pi Zero Pin 29)
#   B      = GPIO6   (Pi Zero Pin 31)
#
# Key name reference: https://github.com/adafruit/Adafruit-Retrogame/blob/master/keyTable.h
# =============================================================================

LEFTCTRL  5    # A button
LEFTALT   6    # B button
UP        13
DOWN      19
LEFT      16
RIGHT     20
RETURN    21   # Start
ESC       26   # Select
